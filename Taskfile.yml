# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

tasks:
  run-android:
    desc: Run the app in debug mode on Android
    dir: app
    cmds:
      - flutter run -d emulator
  run-chrome:
    desc: Run the app in debug mode on Chrome
    dir: app
    cmds:
      - flutter run -d chrome
  run-chrome-release:
    desc: Run the app in release mode
    dir: app
    cmds:
      - flutter run --release -d chrome
  build-web:
    desc: Build web with version info
    dir: app
    cmds:
      - flutter build web --release --base-href /didit/
        --dart-define="APP_VERSION=$(git rev-parse --short HEAD) ($(date -u
        +%Y-%m-%d))"
  build-android:
    desc: Build Android App Bundle with version info
    dir: app
    cmds:
      - flutter build appbundle --release --dart-define="APP_VERSION=$(git
        rev-parse --short HEAD) ($(date -u +%Y-%m-%d))"
  build-android-open-release-folder-windows:
    desc: Open Android release folder in Windows Explorer to upload aab file
    dir: .
    cmds:
      - explorer app\\build\\app\\outputs\\bundle\\release
  build-ios:
    desc: Build iOS IPA with version info
    dir: app
    cmds:
      - flutter build ipa --release --dart-define="APP_VERSION=$(git rev-parse
        --short HEAD) ($(date -u +%Y-%m-%d))"
  test:
    desc: Run all tests
    dir: app
    cmds:
      - flutter test
  format:
    desc: Format Dart code and Prettier-supported project files
    cmds:
      - dart format app
      - npx prettier --write .
  bump:
    desc: Auto-increment the build number in pubspec.yaml (e.g. 1.0.0+3 -> 1.0.0+4)
    dir: app
    cmds:
      - dart run tool/bump_version.dart build
  bump-patch:
    desc: Auto-increment the patch and build number in pubspec.yaml (e.g. 1.0.0+3 -> 1.0.1+4)
    dir: app
    cmds:
      - dart run tool/bump_version.dart patch
  gen-art:
    desc: Generate all platform icons and splash screens from logo source files
    dir: app
    cmds:
      - dart run flutter_launcher_icons
      - cp assets/logo/didit-logo.svg web/favicon.svg
      - cp assets/logo/didit-logo.png web/favicon.png
      - dart run flutter_native_splash:create
